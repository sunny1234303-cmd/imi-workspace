name: Build Checkmate (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - 'checkmate-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-win:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: 10-projects/18-checklist-app

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Checkmate-Windows-Setup
          path: 10-projects/18-checklist-app/dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 10-projects/18-checklist-app/dist/*.exe
          name: Checkmate ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
