    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      min-height: 100vh;
      display: flex;

    @keyframes colorShift {
      0%   { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
      33%  { opacity: 0.85; filter: hue-rotate(30deg) brightness(1.1); }
      66%  { opacity: 1; filter: hue-rotate(-20deg) brightness(0.95); }

    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:

        radial-gradient(ellipse 60% 40% at 30% 20%, rgba(30, 50, 160, 0.3) 0%, transparent 60%),

      max-width: 480px;
      width: 100%;
      padding: 60px 32px;
      display: flex;
      flex-direction: column;

      color: #fff;
      margin-bottom: 48px;
      word-break: keep-all;
    }

    .cta-wrap {
      position: relative;

      inset: -8px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(120, 140, 255, 0.35) 0%, transparent 70%);
      filter: blur(8px);
      pointer-events: none;
      animation: glowPulse 3s ease-in-out infinite;
    }

    .cta {

      text-decoration: none;
      color: #fff;

      backdrop-filter: blur(12px);
