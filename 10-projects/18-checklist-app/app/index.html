<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkmate</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    :root {
      --font: 'Pretendard Variable', 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --letter-spacing: -0.02em;
      --text-primary:   #1A1A1A;
      --text-secondary: #7F7F7F;
      --text-muted:     #7F7F7F;
      --bg-base:        #FAF9F6;
      --bg-secondary:   #F0EFE9;
      --bg-hover:       #E8E7E0;
      --border:         #222222;
      --border-width:   2.25px;
      --border-subtle:  #d8d4ce;
      --priority-high:   #ef4444;
      --priority-medium: #f97316;
      --priority-low:    #9ca3af;
      --dot-todo:    #3b82f6;
      --dot-company: #f97316;
      --dot-gcal:    #22c55e;
      --radius-sm: 0px;
      --radius-md: 0px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 14px;
      letter-spacing: var(--letter-spacing);
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      background: var(--bg-base);
      border-left: 1px solid var(--border-subtle);
      border-right: 1px solid var(--border-subtle);
    }

    /* ── Header ── */
    .app-header {
      padding: 36px 24px 14px;
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 0;
      background: var(--bg-base);
      z-index: 10;
      -webkit-app-region: drag;
    }
    .app-header * { -webkit-app-region: no-drag; }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-date { font-size: 19px; font-weight: 500; color: var(--text-primary); }
    .header-day  { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .clock-badge {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
    }

    .progress-row { display: flex; align-items: center; gap: 10px; }
    .progress-track { flex: 1; height: 2px; background: var(--border-subtle); border-radius: 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--text-primary); border-radius: 0; transition: width 0.4s ease; width: 0%; }
    .progress-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .header-briefing {
      font-size: 12px; color: var(--text-muted);
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--border-subtle);
      letter-spacing: -0.01em; line-height: 1.4;
    }
    .header-message {
      font-size: 13px; color: var(--text-primary);
      margin-top: 6px; letter-spacing: -0.02em; line-height: 1.5;
    }
    .header-name-btn {
      font-weight: 600; cursor: pointer;
      border-bottom: 1px dashed var(--text-muted);
      padding-bottom: 1px;
    }
    .header-name-btn:hover { border-bottom-color: var(--text-primary); }

    /* ── 이전 데이터 토글 ── */
    .history-toggle {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 8px 10px;
      background: none; border: none; border-top: 1px solid var(--border-subtle);
      font-family: inherit; font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-muted); cursor: pointer;
      margin-top: 16px; transition: color 0.15s;
    }
    .history-toggle:hover { color: var(--text-primary); }
    .history-toggle svg { margin-left: auto; transition: transform 0.2s; }
    .history-toggle.open svg { transform: rotate(180deg); }
    .history-body { display: none; }
    .history-body.open { display: block; }
    .history-date-item {
      border-bottom: 1px solid var(--border-subtle);
      overflow: hidden;
    }
    .history-date-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 8px 10px; background: none; border: none;
      font-family: inherit; font-size: 12px; color: var(--text-primary);
      cursor: pointer; text-align: left; transition: background 0.1s;
    }
    .history-date-btn:hover { background: var(--bg-secondary); }
    .history-date-btn svg { flex-shrink: 0; transition: transform 0.2s; color: var(--text-muted); }
    .history-date-btn.open svg { transform: rotate(180deg); }
    .history-date-content { display: none; padding: 8px 12px 12px; background: var(--bg-secondary); }
    .history-date-content.open { display: block; }
    .history-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin: 8px 0 4px; }
    .history-todo-item { font-size: 12px; color: var(--text-primary); padding: 2px 0; display: flex; align-items: center; gap: 6px; }
    .history-todo-item.done { color: var(--text-muted); text-decoration: line-through; }
    .history-memo-text { font-size: 12px; color: var(--text-primary); white-space: pre-wrap; line-height: 1.6; }

    /* ── 로그 토글 ── */
    .log-toggle {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 8px 10px;
      background: none; border: none; border-top: 1px solid var(--border-subtle);
      font-family: inherit; font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-muted); cursor: pointer;
      margin-top: 8px; transition: color 0.15s;
    }
    .log-toggle:hover { color: var(--text-primary); }
    .log-toggle svg { margin-left: auto; transition: transform 0.2s; }
    .log-toggle.open svg { transform: rotate(180deg); }
    .log-body { display: none; max-height: 320px; overflow-y: auto; }
    .log-body.open { display: block; }
    .log-entry {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-bottom: 1px solid var(--border-subtle);
      font-size: 11px;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-type-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      padding: 1px 5px; flex-shrink: 0; margin-top: 1px;
    }
    .log-type-badge.add    { background: #dcfce7; color: #166534; }
    .log-type-badge.delete { background: #fee2e2; color: #991b1b; }
    .log-type-badge.sync   { background: #e0f2fe; color: #075985; }
    .log-type-badge.err    { background: #fef3c7; color: #92400e; }
    .log-entry-content { flex: 1; }
    .log-entry-title { color: var(--text-primary); }
    .log-entry-ts    { color: var(--text-muted); font-size: 10px; margin-top: 1px; }
    .log-restore-btn {
      background: none; border: 1px solid var(--border-subtle);
      font-family: inherit; font-size: 10px; color: var(--text-muted);
      padding: 2px 6px; cursor: pointer; flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .log-restore-btn:hover { border-color: #22c55e; color: #16a34a; }

    /* ── Body ── */
    .app-body {
      display: grid;
      grid-template-columns: 1fr 300px;
      flex: 1;
    }

    .left-panel  { padding: 24px; border-right: 1px solid var(--border-subtle); overflow-y: auto; }
    .right-panel { padding: 20px; position: sticky; top: 73px; height: calc(100vh - 73px); overflow-y: auto; }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 1px 7px;
    }

    .section-add-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      transition: all 0.15s;
      font-family: var(--font);
      letter-spacing: var(--letter-spacing);
    }

    .section-add-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    .section-divider { border: none; border-top: 1px solid var(--border-subtle); margin: 20px 0; }

    /* ── Task timer indicator ── */
    .task-timer-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: -6px;
      margin-bottom: 8px;
      padding: 0 2px;
    }
    .task-timer-indicator.active { display: flex; }
    .task-timer-indicator-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--dot-todo);
      flex-shrink: 0;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .task-timer-indicator-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-secondary);
    }
    .task-timer-indicator-time {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    /* ── Todo list ── */
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-bottom: 6px;
    }

    .todo-item {
      border-radius: var(--radius-md);
      transition: background 0.15s;
    }

    .todo-item:hover { background: var(--bg-hover); }
    .todo-item.running { background: var(--bg-secondary); }
    .todo-item.dragging { opacity: 0.35; }

    .todo-item.drag-over-top    { border-top: 2px solid var(--text-primary); }
    .todo-item.drag-over-bottom { border-bottom: 2px solid var(--text-primary); }

    .todo-main {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 8px 6px;
      cursor: pointer;
      user-select: none;
    }

    .drag-handle {
      color: var(--text-muted);
      cursor: grab;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      padding: 2px;
    }

    .todo-item:hover .drag-handle { opacity: 1; }
    .drag-handle:active { cursor: grabbing; }

    .priority-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .todo-item.priority-high   .priority-dot { background: var(--priority-high); }
    .todo-item.priority-medium .priority-dot { background: var(--priority-medium); }
    .todo-item.priority-low    .priority-dot { background: var(--priority-low); }

    .todo-check {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border-subtle);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .todo-item.done .todo-check { background: var(--text-primary); border-color: var(--text-primary); }
    .todo-check-icon { display: none; }
    .todo-item.done .todo-check-icon { display: block; }

    .todo-content { flex: 1; min-width: 0; }
    .todo-label { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.6; }
    .todo-sub   { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .todo-item.done .todo-label { text-decoration: line-through; color: var(--text-muted); }
    .todo-item.done .todo-sub   { color: var(--border-subtle); }

    .todo-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item:hover .todo-actions { opacity: 1; }

    /* ── Timer ── */
    .todo-timer {
      padding: 6px 10px 10px 44px;
      display: none;
      flex-direction: column;
      gap: 7px;
    }
    .todo-item.timer-open .todo-timer,
    .todo-item.running .todo-timer { display: flex; }

    .duration-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }

    .dur-btn {
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--border-subtle);
      border-radius: 0;
      padding: 3px 10px;
      cursor: pointer;
      background: var(--bg-base);
      color: var(--text-secondary);
      transition: all 0.15s;
      font-family: var(--font);
      letter-spacing: var(--letter-spacing);
    }

    .dur-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
    .dur-btn.selected { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

    .dur-custom-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      border: 1px solid var(--border-subtle);
      border-radius: 0;
      padding: 2px 8px 2px 6px;
      background: var(--bg-base);
      transition: border-color 0.15s;
    }

    .dur-custom-wrap:focus-within,
    .dur-custom-wrap.selected { border-color: var(--text-primary); }

    .dur-custom {
      border: none; outline: none;
      font-size: 11px; color: var(--text-primary);
      font-family: var(--font);
      letter-spacing: var(--letter-spacing);
      background: transparent;
      text-align: center;
    }
    .dur-hour { width: 18px; }
    .dur-min  { width: 22px; }

    .dur-custom::placeholder { color: var(--text-muted); }
    .dur-custom::-webkit-inner-spin-button,
    .dur-custom::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .dur-custom { -moz-appearance: textfield; }
    .dur-unit { font-size: 11px; color: var(--text-secondary); }

    .timer-row { display: flex; align-items: center; gap: 8px; }

    .countdown {
      font-size: 20px;
      font-weight: 500;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
      min-width: 58px;
    }

    .countdown.idle { font-size: 12px; font-weight: 400; color: var(--text-muted); }

    .start-btn {
      padding: 5px 14px;
      background: var(--text-primary); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
      letter-spacing: var(--letter-spacing);
      transition: background 0.15s; white-space: nowrap;
    }

    .start-btn:hover { background: #333; }
    .start-btn:disabled { background: var(--border-subtle); cursor: default; }

    .stop-btn {
      padding: 5px 12px;
      background: var(--bg-base); color: var(--text-secondary);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
      font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: var(--font);
      letter-spacing: var(--letter-spacing);
      transition: all 0.15s; white-space: nowrap; display: none;
    }

    .stop-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }

    .todo-item.running .start-btn { display: none; }
    .todo-item.running .stop-btn  { display: inline-block; }

    /* ── Add forms ── */
    .add-form {
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px;
      margin-bottom: 8px;
      display: none;
      background: var(--bg-secondary);
    }

    .add-form.open { display: block; }

    .add-form-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .add-form-row:last-child { margin-bottom: 0; }

    .add-input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      font-size: 13px; color: var(--text-primary);
      outline: none; transition: border-color 0.15s;
      font-family: var(--font);
      letter-spacing: var(--letter-spacing);
      background: var(--bg-base);
    }

    .add-input:focus { border-color: var(--text-primary); }
    .add-input::placeholder { color: var(--text-muted); }

    .priority-btns { display: flex; gap: 4px; }

    .priority-btn {
      padding: 5px 10px;
      border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
      font-size: 11px; font-weight: 700;
      cursor: pointer; background: var(--bg-base); color: var(--text-muted);
      transition: all 0.15s; font-family: var(--font);
      letter-spacing: var(--letter-spacing);
    }

    .priority-btn[data-p="high"].selected   { background: #fee2e2; color: var(--priority-high);   border-color: #fca5a5; }
    .priority-btn[data-p="medium"].selected { background: #fff7ed; color: var(--priority-medium); border-color: #fdba74; }
    .priority-btn[data-p="low"].selected    { background: var(--bg-secondary); color: var(--priority-low); border-color: var(--border-subtle); }

    .confirm-btn {
      padding: 7px 14px;
      background: var(--text-primary); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
      letter-spacing: var(--letter-spacing);
      transition: background 0.15s; white-space: nowrap;
    }

    .confirm-btn:hover { background: #333; }

    .cancel-btn {
      padding: 7px 10px;
      background: none; color: var(--text-muted);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
      font-size: 13px; cursor: pointer; font-family: var(--font);
      letter-spacing: var(--letter-spacing);
      transition: all 0.15s;
    }

    .cancel-btn:hover { color: var(--text-primary); border-color: var(--text-primary); }

    /* ── Icon button ── */
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      border: none; background: none; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-muted);
      transition: all 0.15s; font-family: var(--font);
    }

    .icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .icon-btn.danger:hover { background: #fee2e2; color: #ef4444; }

    /* ── Company list ── */
    .company-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-bottom: 6px;
    }

    .company-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-md);
      cursor: pointer; transition: background 0.15s; user-select: none;
    }

    .company-item:hover { background: var(--bg-hover); }
    .company-item.applied .company-name { text-decoration: line-through; color: var(--text-muted); }
    .company-item.applied .company-role { color: var(--border-subtle); }
    .company-item.past { pointer-events: none; opacity: 0.6; }

    .company-check {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border-subtle); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }

    .company-item.applied .company-check { background: var(--text-primary); border-color: var(--text-primary); }
    .company-check-icon { display: none; }
    .company-item.applied .company-check-icon { display: block; }

    .company-info { flex: 1; min-width: 0; }
    .company-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .company-role { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .company-date { font-size: 11px; color: var(--border-subtle); margin-top: 1px; }

    .company-actions { display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity 0.15s; }
    .company-item:hover .company-actions { opacity: 1; }

    .url-chip {
      font-size: 11px; font-weight: 500;
      color: var(--text-secondary); background: var(--bg-secondary);
      border-radius: var(--radius-sm); padding: 2px 7px;
      text-decoration: none; white-space: nowrap;
      transition: background 0.15s; pointer-events: auto;
    }

    .url-chip:hover { background: var(--bg-hover); color: var(--text-primary); }
    .company-item.applied .url-chip { opacity: 0.4; }

    /* ── Company groups ── */
    .company-group { margin-bottom: 2px; }

    .group-header {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px 5px;
      border-bottom: 1px solid var(--border-subtle);
      user-select: none;
    }

    .group-collapse-btn {
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 0; width: 14px; height: 14px;
      transition: transform 0.15s; flex-shrink: 0;
    }
    .company-group.collapsed .group-collapse-btn { transform: rotate(-90deg); }

    .group-name-text {
      font-size: 11px; font-weight: 600; flex: 1;
      color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase;
    }
    .group-badge-sm { font-size: 11px; color: var(--border-subtle); white-space: nowrap; }

    .group-action-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 2px 4px; font-size: 11px;
      opacity: 0; transition: opacity 0.15s;
      display: flex; align-items: center; gap: 3px;
      font-family: var(--font);
    }
    .group-header:hover .group-action-btn { opacity: 1; }
    .group-action-btn:hover { color: var(--text-primary); }
    .group-action-btn.danger:hover { color: #ef4444; }
    .group-action-btn.move { padding: 2px 2px; }
    .group-action-btn.move:disabled { opacity: 0.2 !important; cursor: default; }

    .company-items { list-style: none; }
    .company-group.collapsed .company-items { display: none; }

    .group-active-indicator {
      font-size: 11px; color: var(--text-muted); padding: 4px 10px 8px;
    }

    .company-date-sep {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted);
      margin: 8px 0 4px; padding: 0 10px;
    }

    .company-date-sep::before,
    .company-date-sep::after { content: ''; flex: 1; border-top: 1px solid var(--border-subtle); }

    .past-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 8px 10px;
      background: none; border: none; border-top: 1px solid var(--border-subtle);
      font-family: inherit; font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-muted); cursor: pointer;
      margin-top: 12px; transition: color 0.15s;
    }
    .past-toggle-btn:hover { color: var(--text-secondary); }
    .past-toggle-btn svg { transition: transform 0.2s; flex-shrink: 0; }
    .past-toggle-btn.open svg { transform: rotate(180deg); }
    .past-records { display: none; }
    .past-records.open { display: block; }

    .empty-msg { text-align: center; font-size: 13px; color: var(--text-muted); padding: 16px 0; }

    /* ── Integration Panel ── */
    .integration-panel {
      margin-top: 16px;
      border: 1px solid var(--border-subtle);
    }
    .integration-toggle {
      display: flex; align-items: center; gap: 7px;
      width: 100%; padding: 8px 10px;
      background: none; border: none;
      font-family: inherit; font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-muted); cursor: pointer;
      transition: color 0.15s;
    }
    .integration-toggle:hover { color: var(--text-primary); }
    .integration-toggle svg { margin-left: auto; transition: transform 0.2s; flex-shrink: 0; }
    .integration-toggle.open svg { transform: rotate(180deg); }
    .int-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border-subtle); flex-shrink: 0;
    }
    .integration-body { display: none; border-top: 1px solid var(--border-subtle); }
    .integration-body.open { display: block; }
    .int-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 9px 10px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 11px;
    }
    .int-row:last-child { border-bottom: none; }
    .int-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border-subtle); flex-shrink: 0; margin-top: 3px;
    }
    .int-dot.ok  { background: #22c55e; }
    .int-dot.err { background: #ef4444; }
    .int-content { flex: 1; }
    .int-title { color: var(--text-primary); font-weight: 500; }
    .int-detail { color: var(--text-muted); display: block; margin-top: 2px; line-height: 1.6; }
    .int-action {
      background: none; border: 1px solid var(--border-subtle);
      font-family: inherit; font-size: 10px; color: var(--text-muted);
      padding: 2px 7px; cursor: pointer; flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .int-action:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    /* ── Calendar ── */
    .cal-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }

    .cal-month { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .cal-nav   { display: flex; gap: 2px; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-weekday {
      text-align: center;
      font-size: 10px; font-weight: 600;
      color: var(--text-muted);
      padding: 4px 0; text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      cursor: pointer; transition: background 0.15s;
      font-size: 12px; color: var(--text-primary);
      position: relative;
    }

    .cal-day:hover { background: var(--bg-hover); }
    .cal-day.empty { cursor: default; pointer-events: none; color: var(--text-muted); opacity: 0.4; }
    .cal-day.no-data { cursor: default; pointer-events: none; }
    .cal-day.no-data:hover { background: transparent; }

    .cal-day.today { background: var(--text-primary); color: #fff; }
    .cal-day.today:hover { background: #333; }

    .cal-day.selected { outline: 2px solid var(--text-primary); outline-offset: -2px; }
    .cal-day.today.selected { outline-color: var(--text-secondary); }

    .cal-day-num { font-size: 12px; line-height: 1; }

    .cal-dots { display: flex; gap: 2px; margin-top: 2px; }
    .cal-dot  { width: 4px; height: 4px; border-radius: 50%; }
    .cal-dot.todo    { background: var(--dot-todo); }
    .cal-dot.company { background: var(--dot-company); }
    .cal-dot.gcal    { background: var(--dot-gcal); }
    .cal-day.today .cal-dot { background: rgba(255,255,255,0.65); }

    .gcal-event-item { font-size: 12px; color: var(--text-primary); padding: 3px 0; display: flex; align-items: flex-start; gap: 6px; }
    .gcal-event-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; min-width: 44px; }
    .gcal-event-del  { margin-left: auto; background: none; border: none; font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 0 2px; }
    .gcal-event-del:hover { color: #ef4444; }
    .gcal-add-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px; padding: 5px 10px;
      font-size: 11px; font-family: inherit; cursor: pointer;
      background: none; border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); color: var(--text-muted);
      transition: all 0.15s;
    }
    .gcal-add-btn:hover { border-color: var(--dot-gcal); color: var(--dot-gcal); }

    /* ── 메모 ── */
    .memo-divider { border: none; border-top: 1px solid var(--border-subtle); margin: 20px 0 14px; }
    .memo-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 8px;
    }
    .memo-textarea {
      width: 100%; box-sizing: border-box;
      min-height: 120px; resize: vertical;
      background: var(--bg-base); color: var(--text-primary);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
      padding: 10px 12px; font-family: inherit; font-size: 13px; line-height: 1.6;
      outline: none; transition: border-color 0.15s;
    }
    .memo-textarea::placeholder { color: var(--text-muted); }
    .memo-textarea:focus { border-color: var(--text-secondary); }
    .memo-saved {
      font-size: 11px; color: var(--text-muted);
      text-align: right; margin-top: 4px;
      opacity: 0; transition: opacity 0.3s;
    }
    .memo-saved.show { opacity: 1; }

    /* ── Detail panel ── */
    .detail-panel {
      position: fixed;
      top: 0; right: 0;
      width: 300px; height: 100vh;
      background: var(--bg-base);
      border-left: 1px solid var(--border-subtle);
      box-shadow: none;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 100;
      overflow-y: auto;
      padding: 20px;
    }

    .detail-panel.open { transform: translateX(0); }

    .panel-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.08);
      z-index: 99; display: none;
    }

    .panel-overlay.open { display: block; }

    .detail-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 18px;
    }

    .detail-date { font-size: 15px; font-weight: 500; color: var(--text-primary); }

    .detail-section-title {
      font-size: 10px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 8px; margin-top: 14px;
    }

    .detail-section-title:first-of-type { margin-top: 0; }

    .detail-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

    .detail-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 6px; border-radius: var(--radius-sm);
      font-size: 13px;
    }

    .detail-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-subtle); flex-shrink: 0; }
    .detail-item.done    .detail-dot { background: var(--text-primary); }
    .detail-item.applied .detail-dot { background: var(--priority-medium); }
    .detail-item.done    .detail-name { text-decoration: line-through; color: var(--text-muted); }
    .detail-item.applied .detail-name { text-decoration: line-through; color: var(--text-muted); }
    .detail-name { flex: 1; color: var(--text-primary); }
    .detail-role { font-size: 11px; color: var(--text-muted); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .app-body { grid-template-columns: 1fr; }
      .right-panel { position: static; height: auto; padding: 20px 24px; border-top: 1px solid var(--border-subtle); }
    }

  /* ── 랜딩 투어 하이라이트 ── */
  .tour-hl {
    outline: 1.5px dashed #1A1A1A !important;
    outline-offset: 4px !important;
    animation: __tourPulse__ 1.6s ease-in-out infinite !important;
  }
  @keyframes __tourPulse__ {
    0%, 100% { outline-color: #1A1A1A; }
    50%       { outline-color: #d8d4ce; }
  }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="app-header">
    <div class="header-row">
      <div>
        <div class="header-date" id="header-date">—</div>
        <div class="header-day"  id="header-day">—</div>
      </div>
      <div class="clock-badge" id="clock">--:--</div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">0 / 0 완료</span>
    </div>
    <div class="header-briefing" id="header-briefing">로딩 중…</div>
    <div class="header-message" id="header-message"></div>
  </header>

  <div class="app-body">

    <!-- Left Panel -->
    <div class="left-panel">

      <!-- Tasks -->
      <div class="section-header">
        <div class="section-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Tasks
          <span class="section-badge" id="task-badge">0</span>
        </div>
        <button class="section-add-btn" id="todo-add-toggle" onclick="toggleTodoForm()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>

      <div class="task-timer-indicator" id="task-timer-indicator">
        <span class="task-timer-indicator-dot"></span>
        <span class="task-timer-indicator-label" id="task-timer-indicator-label"></span>
        <span class="task-timer-indicator-time" id="task-timer-indicator-time"></span>
      </div>

      <div class="add-form" id="todo-form">
        <div class="add-form-row">
          <input class="add-input" id="ti-label" type="text" placeholder="할 일 입력" />
        </div>
        <div class="add-form-row">
          <input class="add-input" id="ti-sub" type="text" placeholder="부제목 (선택)" />
        </div>
        <div class="add-form-row" style="align-items:center;">
          <div class="priority-btns">
            <button class="priority-btn selected" data-p="high"   onclick="selectPriority(this)">H</button>
            <button class="priority-btn"           data-p="medium" onclick="selectPriority(this)">M</button>
            <button class="priority-btn"           data-p="low"    onclick="selectPriority(this)">L</button>
          </div>
          <div style="flex:1;"></div>
          <button class="cancel-btn" onclick="toggleTodoForm()">취소</button>
          <button class="confirm-btn" onclick="addTodo()">추가</button>
        </div>
      </div>

      <ul class="todo-list" id="todo-list"></ul>

      <hr class="section-divider" />

      <!-- Applications -->
      <div id="company-section">
      <div class="section-header">
        <div class="section-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Applications
          <span class="section-badge" id="company-badge">0개</span>
        </div>
        <button class="section-add-btn" onclick="toggleGroupForm()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          그룹
        </button>
      </div>

      <div class="add-form" id="group-form">
        <div class="add-form-row">
          <input class="add-input" id="gi-name" type="text" placeholder="그룹명 (예: 인사이트, 경쟁사, URL리스트)" />
        </div>
        <div class="add-form-row" style="justify-content:flex-end;">
          <button class="cancel-btn" onclick="toggleGroupForm()">취소</button>
          <button class="confirm-btn" onclick="addGroup()">추가</button>
        </div>
      </div>

      <div class="add-form" id="company-form">
        <div class="group-active-indicator" id="company-form-group-label"></div>
        <div class="add-form-row">
          <input class="add-input" id="ci-name" type="text" placeholder="제목 (회사명)" />
          <input class="add-input" id="ci-role" type="text" placeholder="추가 작성" style="max-width:130px;" />
        </div>
        <div class="add-form-row">
          <input class="add-input" id="ci-url" type="url" placeholder="URL" />
        </div>
        <div class="add-form-row" style="justify-content:flex-end;">
          <button class="cancel-btn" onclick="toggleCompanyForm()">취소</button>
          <button class="confirm-btn" onclick="addCompany()">추가</button>
        </div>
      </div>

      <ul class="company-list" id="company-list"></ul>

      </div><!-- /#company-section -->

      <!-- 이전 데이터 토글 -->
      <button class="history-toggle" id="history-toggle" onclick="toggleHistoryPanel()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        이전 데이터
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="history-body" id="history-body"></div>

    </div>

    <!-- Right Panel: Calendar -->
    <div class="right-panel">
      <div class="cal-header">
        <div class="cal-month" id="cal-month-label">—</div>
        <div class="cal-nav">
          <button class="icon-btn" onclick="changeMonth(-1)" title="이전 달">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="icon-btn" onclick="changeMonth(1)" title="다음 달">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>

      <hr class="memo-divider" />
      <div class="memo-label">메모</div>
      <textarea
        class="memo-textarea"
        id="memo-textarea"
        placeholder="자유롭게 메모하세요…"
        oninput="debounceSaveMemo()"
      ></textarea>
      <div class="memo-saved" id="memo-saved">저장됨</div>

      <!-- 연동 관리 패널 -->
      <div class="integration-panel">
        <button class="integration-toggle" id="integration-toggle" onclick="toggleIntegrationPanel()">
          <span class="int-status-dot" id="int-status-dot"></span>
          연동 관리
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="integration-body" id="integration-body">
          <!-- 워크스페이스 -->
          <div class="int-row">
            <span class="int-dot" id="ws-dot"></span>
            <div class="int-content">
              <span class="int-title">워크스페이스</span>
              <span class="int-detail" id="ws-detail">확인 중…</span>

          </div>
          <!-- 애플 메모 -->
          <div class="int-row">
            <span class="int-dot" id="notes-dot"></span>
            <div class="int-content">
              <span class="int-title">애플 메모</span>
              <span class="int-detail" id="notes-detail">대기 중</span>
            </div>
          </div>
          <!-- Google -->
          <div class="int-row">
            <span class="int-dot" id="gcal-dot"></span>
            <div class="int-content">
              <span class="int-title">Google Calendar · Tasks</span>
              <span class="int-detail" id="gcal-detail">미연결</span>
            </div>
            <button class="int-action" id="gcal-action" onclick="gcalConnect()">연결하기</button>
          </div>
        </div>
      </div>

      <!-- 로그 토글 -->
      <button class="log-toggle" id="log-toggle" onclick="toggleLogPanel()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="log-body" id="log-body"></div>

    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="panel-overlay" id="panel-overlay" onclick="closeDetailPanel()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="detail-date" id="detail-date">—</div>
    <button class="icon-btn" onclick="closeDetailPanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div id="detail-body"></div>
</div>

<script>
  // ── Helpers ──────────────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }

  function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function isoToDot(iso) { return iso.replace(/-/g, '.'); }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const API_BASE  = window.electronAPI ? 'https://18-checklist-app.vercel.app' : '';
  const DAYS_KO   = ['일','월','화','수','목','금','토'];
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // ── App state ────────────────────────────────────────────
  let todos         = [];   // { id, label, sub, priority, order, done, durMin }
  let companies     = [];   // { name, role, url, date, applied, group }
  let companyGroups = ['회사리스트'];  // ordered group names
  let collapsedGroups = new Set();
  let addToGroup    = '회사리스트';  // context for company add form
  let timerState    = {};   // { [id]: { endTime, durMin, remaining, intervalId } }
  let histIndex     = {};   // { "2026-05-13": { companies, todos } }
  let gcalEvents    = {};   // { "2026-06-12": [{ id, title, start, end, allDay }] }
  let gcalConnected = false;
  let newPriority   = 'high';

  const calState = {
    year: new Date().getFullYear(),
    month: new Date().getMonth(),
    selected: null
  };

  const LS_TODOS        = 'checklist-todos-v3';
  const LS_COMPANIES    = () => `checklist-companies-${todayISO()}-v3`;
  const LS_GROUPS_META  = 'checklist-groups-meta-v1';
  const LS_TIMERS       = 'checklist-timers-v3';
  const LS_CAL          = 'checklist-cal-v3';
  const LS_MEMO         = () => `checklist-memo-${todayISO()}-v1`;

  // ── API 인증 헬퍼 ────────────────────────────────────────────
  let _cachedToken = null;
  async function getAuthHeaders(extra) {
    const base = { 'Content-Type': 'application/json', ...extra };
    if (!window.electronAPI) return base;
    if (!_cachedToken || (Date.now() > (_cachedToken.expiry || 0) - 60000)) {
      _cachedToken = await window.electronAPI.getToken().catch(() => null);
    }
    if (!_cachedToken) return base;
    return {
      ...base,
      'Authorization': `Bearer ${_cachedToken.access_token}`,
      'X-User-Id':     _cachedToken.user_id || '',
    };
  }

  function apiFetch(path, options = {}) {
    return getAuthHeaders(options.headers).then(headers =>
      fetch(`${API_BASE}${path}`, { ...options, headers })
    );
  }

  // ── LocalStorage ─────────────────────────────────────────
  function saveTodos() {
    try {
      localStorage.setItem(LS_TODOS, JSON.stringify(todos));
    } catch(e) {
      console.error('[saveTodos] localStorage 저장 실패:', e);
    }
    syncTodosToServer();
    syncAppleNotes();
  }

  function saveCompanies() {
    localStorage.setItem(LS_COMPANIES(), JSON.stringify(companies));
    localStorage.setItem(LS_GROUPS_META, JSON.stringify(companyGroups));
  }

  function saveTimers() {
    const data = {};
    Object.keys(timerState).forEach(id => {
      const t = timerState[id];
      if (t && t.endTime) data[id] = { endTime: t.endTime, durMin: t.durMin };
    });
    localStorage.setItem(LS_TIMERS, JSON.stringify(data));
  }

  function loadLocal() {
    try { const r = localStorage.getItem(LS_TODOS);     if (r) todos      = JSON.parse(r); } catch(e) {}
    try {
      let r = localStorage.getItem(LS_COMPANIES());
      // 이전 버전 키 폴백 (v3 이전 데이터 복구)
      if (!r) r = localStorage.getItem(`checklist-companies-${todayISO()}-v2`);
      if (!r) r = localStorage.getItem(`checklist-companies-${todayISO()}`);
      if (r) companies = JSON.parse(r);
      // group 필드 없거나 비어있으면 회사리스트로 마이그레이션
      companies = companies.map(c => ({ ...c, group: c.group || '회사리스트' }));
    } catch(e) {}
    try {
      const r = localStorage.getItem(LS_GROUPS_META);
      if (r) companyGroups = JSON.parse(r);
      if (!companyGroups.includes('회사리스트')) companyGroups.unshift('회사리스트');
    } catch(e) {}
    try { const r = localStorage.getItem(LS_TIMERS);    if (r) timerState = JSON.parse(r); } catch(e) {}
    try {
      const r = localStorage.getItem(LS_CAL);
      if (r) { const c = JSON.parse(r); calState.year = c.year; calState.month = c.month; }
    } catch(e) {}
    try {
      const r = localStorage.getItem(LS_MEMO());
      if (r !== null) document.getElementById('memo-textarea').value = r;
    } catch(e) {}
  }

  // ── Google Calendar ───────────────────────────────────────
  function gcalConnect() {
    if (window.electronAPI) {
      window.electronAPI.openAuth();
    } else {
      window.open(`${API_BASE}/api/auth/google`, '_blank', 'width=500,height=600');
      const timer = setInterval(() => {
        apiFetch('/api/auth/status').then(r => r.json()).then(d => {
          if (d.authenticated) { clearInterval(timer); initGcal(); }
        }).catch(() => {});
      }, 2000);
      setTimeout(() => clearInterval(timer), 120000);
    }
  }

  async function initGcal() {
    if (!window.electronAPI && location.protocol === 'file:') return;
    const res = await apiFetch('/api/auth/status').then(r => r.json()).catch(() => ({}));
    gcalConnected = !!res.authenticated;
    const dot    = document.getElementById('gcal-dot');
    const detail = document.getElementById('gcal-detail');
    const action = document.getElementById('gcal-action');
    if (!dot) return;
    intState.gcal = gcalConnected;
    dot.className = 'int-dot ' + (gcalConnected ? 'ok' : 'err');
    if (gcalConnected) {
      detail.textContent = '연동됨';
      if (action) action.style.display = 'none';
      loadGCalEvents(calState.year, calState.month);
    } else {
      detail.textContent = '미연결';
      if (action) { action.style.display = ''; action.onclick = gcalConnect; }
    }
    updateIntegrationDot();
  }

  function loadGCalEvents(year, month) {
    if (!gcalConnected || (!window.electronAPI && location.protocol === 'file:')) return;
    apiFetch(`/api/calendar/events?year=${year}&month=${month + 1}`)
      .then(r => r.json().then(d => { if (r.ok) return d; console.error('[gcal]', d); return {}; }))
      .then(({ events = [] }) => {
        gcalEvents = {};
        events.forEach(e => {
          const date = (e.start.date || e.start.dateTime || '').slice(0, 10);
          if (!gcalEvents[date]) gcalEvents[date] = [];
          gcalEvents[date].push({
            id: e.id,
            title: e.summary || '(제목 없음)',
            allDay: !!e.start.date,
            startTime: e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : null,
          });
        });
        renderCalendar();
      }).catch(() => {});
  }

  function gcalAddEvent(title, date) {
    if (!gcalConnected) return;
    apiFetch('/api/calendar/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, date, description: '체크리스트에서 추가됨' })
    }).then(r => r.json()).then(d => {
      if (d.ok) loadGCalEvents(calState.year, calState.month);
    }).catch(() => {});

  function gcalDeleteEvent(id) {
    apiFetch(`/api/calendar/events/${encodeURIComponent(id)}`, { method: 'DELETE' })
      .then(() => loadGCalEvents(calState.year, calState.month))
      .catch(() => {});

  // ── 일일 메시지 ──────────────────────────────────────────────
  function getDailyMessage({ name, total, done, events, pending }) {
    const now   = new Date();
    const dow   = now.getDay();   // 0=일 1=월 … 6=토
    const hour  = now.getHours();
    const seed  = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
    const pick  = (arr) => arr[seed % arr.length];

    if (total > 0 && done === total) {
      return pick([
        `오늘 할일을 모두 완료했어요! 정말 대단해요.`,
        `모든 할일 완료! 오늘 하루 수고 많으셨어요.`,
        `완벽한 하루였어요. 잘 쉬세요!`,
      ]);
    }

    const ratio = total > 0 ? done / total : -1;

    if (total >= 5 && ratio < 0.3) {
      return pick([
        `할일이 많은 날이에요. 우선순위를 세우는 걸 추천드려요!`,
        `오늘은 하나씩 차근차근 해봐요. 리스트가 길어도 괜찮아요.`,
        `집중이 필요한 날이에요. 중요한 것 먼저 시작해봐요!`,
      ]);
    }

    if (events >= 3) {
      return pick([
        `일정이 많은 날이에요. 이동 시간도 미리 챙겨두세요.`,
        `오늘 바쁜 하루예요. 중간중간 쉬는 시간도 중요해요.`,
      ]);
    }

    if (dow === 1) {
      return pick([
        `새로운 한 주가 시작됐어요. 이번 주도 잘 해봐요!`,
        `월요일 파이팅! 작은 것 하나부터 시작해봐요.`,
      ]);
    }

    if (dow === 5) {
      return pick([
        `한 주의 마무리가 다가왔어요. 잘 마무리해봐요!`,
        `이번 주도 수고 많았어요. 조금만 더 파이팅!`,
      ]);
    }

    if (dow === 0 || dow === 6) {
      return pick([
        `주말이에요. 충분히 쉬는 것도 중요해요.`,
        `오늘은 여유롭게 보내도 좋아요. 잘 쉬세요!`,
      ]);
    }

    if (hour < 10) {
      return pick([
        `좋은 아침이에요! 오늘도 잘 부탁드려요.`,
        `하루를 상쾌하게 시작해봐요!`,
        `오늘의 첫 시작이에요. 작은 것부터 해봐요!`,
      ]);
    }

    if (hour >= 22) {
      return pick([
        `오늘 하루도 수고했어요. 충분히 쉬세요.`,
        `내일을 위해 편히 쉬는 건 어때요?`,
      ]);
    }

    if (pending > 0) {
      return pick([
        `지원 중인 곳의 소식을 기다리고 있어요. 잘 될 거예요!`,
        `오늘도 좋은 결과가 있을 거예요. 기대해봐요.`,
      ]);
    }

    if (ratio >= 0.5 && ratio < 1) {
      return pick([
        `절반 이상 완료했어요! 순조롭게 진행 중이에요.`,
        `잘 하고 있어요. 계속 이 속도로 가봐요!`,
      ]);
    }

    return pick([
      `오늘도 차근차근 해봐요!`,
      `오늘 하루도 잘 부탁드려요!`,
      `작은 것부터 시작해보는 건 어때요?`,
      `오늘은 어떤 하루를 만들어볼까요?`,
    ]);
  }

  function updateBriefing() {
    const total    = todos.length;
    const done     = todos.filter(t => t.done).length;
    const events   = (gcalEvents[todayISO()] || []).length;
    const pending  = companies.filter(c => !c.applied).length;
    const parts    = [];
    if (total > 0) parts.push(`할일 ${total}개 중 ${done}개 완료`);
    else parts.push('오늘 할일 없음');
    if (events > 0) parts.push(`오늘 일정 ${events}개`);
    if (pending > 0) parts.push(`지원 대기 ${pending}개`);
    document.getElementById('header-briefing').textContent = parts.join(' · ');

    const name = getUserName();
    const msg  = getDailyMessage({ name, total, done, events, pending });
    const el   = document.getElementById('header-message');
    el.innerHTML = `<span class="header-name-btn" onclick="editUserName()" title="클릭하여 이름 변경">${name}님</span> ${msg}`;
  }

  // ── 이전 데이터 패널 ─────────────────────────────────────────
  function toggleHistoryPanel() {
    const btn  = document.getElementById('history-toggle');
    const body = document.getElementById('history-body');
    const isOpen = btn.classList.toggle('open');
    body.classList.toggle('open', isOpen);
    if (isOpen) renderHistoryPanel();
  }

  function renderHistoryPanel() {
    const body = document.getElementById('history-body');
    const dates = Object.keys(histIndex).sort().reverse();
    const today = todayISO();
    const pastDates = dates.filter(d => d !== today && d < today);
    if (pastDates.length === 0) {
      body.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:var(--text-muted);">이전 기록 없음</div>';
      return;
    }
    body.innerHTML = pastDates.map(dateISO => {
      const d = histIndex[dateISO] || {};
      const todoCount = (d.todos || []).length;
      const doneCount = (d.todos || []).filter(t => t.done).length;
      const compCount = (d.companies || []).length;
      const displayDate = dateISO.replace(/-/g, '.');
      const summary = [
        todoCount > 0 ? `할일 ${doneCount}/${todoCount}` : '',
        compCount > 0 ? `지원 ${compCount}건` : '',
        d.memo ? '메모 있음' : '',
      ].filter(Boolean).join(' · ') || '기록만 있음';
      return `<div class="history-date-item">
        <button class="history-date-btn" onclick="toggleHistoryDate(this,'${dateISO}')">
          <span>${displayDate} <span style="color:var(--text-muted);font-size:11px;">${summary}</span></span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="history-date-content" id="hdc-${dateISO}"></div>
      </div>`;
    }).join('');
  }

  function toggleHistoryDate(btn, dateISO) {
    btn.classList.toggle('open');
    const content = document.getElementById('hdc-' + dateISO);
    if (!content.classList.toggle('open')) return;
    const d = histIndex[dateISO] || {};
    let html = '';
    if ((d.todos || []).length > 0) {
      html += `<div class="history-section-label">할일</div>`;
      html += (d.todos || []).map(t =>
        `<div class="history-todo-item${t.done ? ' done' : ''}">
          <span style="width:6px;height:6px;border-radius:50%;background:${t.done ? 'var(--text-primary)' : 'var(--border-subtle)'};flex-shrink:0;display:inline-block;margin-top:3px;"></span>
          ${t.label}${t.sub ? `<span style="color:var(--text-muted);"> · ${t.sub}</span>` : ''}
        </div>`
      ).join('');
    }
    if ((d.companies || []).length > 0) {
      html += `<div class="history-section-label">지원 현황</div>`;
      html += (d.companies || []).map(c =>
        `<div class="history-todo-item${c.applied ? ' done' : ''}">
          <span style="width:6px;height:6px;border-radius:50%;background:${c.applied ? 'var(--priority-medium)' : 'var(--border-subtle)'};flex-shrink:0;display:inline-block;margin-top:3px;"></span>
          ${c.name}${c.role ? `<span style="color:var(--text-muted);"> · ${c.role}</span>` : ''}
        </div>`
      ).join('');
    }
    if (d.memo) {
      html += `<div class="history-section-label">메모</div><div class="history-memo-text">${d.memo}</div>`;
    }
    content.innerHTML = html || '<div style="color:var(--text-muted);font-size:12px;">데이터 없음</div>';
  }

  // ── 로그 패널 ────────────────────────────────────────────────
  function logAction(type, data) {
    if (!window.electronAPI && location.protocol === 'file:') return;
    apiFetch('/api/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, data })
    }).catch(() => {});
  }

  function toggleLogPanel() {
    const btn  = document.getElementById('log-toggle');
    const body = document.getElementById('log-body');
    const isOpen = btn.classList.toggle('open');
    body.classList.toggle('open', isOpen);
    if (isOpen) loadAndRenderLog();
  }

  function loadAndRenderLog() {
    if (window._demoLog) { renderLogPanel(window._demoLog); return; }
    apiFetch('/api/log').then(r => r.json()).then(renderLogPanel).catch(() => {});
  }

  const LOG_TYPE_MAP = {
    todo_add:    { label: '추가', cls: 'add' },
    todo_delete: { label: '삭제', cls: 'delete' },
    todo_toggle: { label: '체크', cls: 'sync' },
    company_add: { label: '추가', cls: 'add' },
    company_delete: { label: '삭제', cls: 'delete' },
    group_delete: { label: '그룹삭제', cls: 'delete' },
    sync:        { label: '동기화', cls: 'sync' },
    memo_sync:   { label: '메모', cls: 'sync' },
    error:       { label: '오류', cls: 'err' },
  };

  function renderLogPanel(log) {
    const body = document.getElementById('log-body');
    if (!log || log.length === 0) {
      body.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:var(--text-muted);">로그 없음</div>';
      return;
    }
    body.innerHTML = log.slice(0, 100).map((entry, i) => {
      const meta = LOG_TYPE_MAP[entry.type] || { label: entry.type, cls: 'sync' };
      const isDelete = entry.type === 'todo_delete' || entry.type === 'company_delete';
      const title = entry.data?.label || entry.data?.name || entry.data?.date
        || (entry.data?.todoCount !== undefined ? `할일 ${entry.data.todoCount}개` : entry.type);
      return `<div class="log-entry">
        <span class="log-type-badge ${meta.cls}">${meta.label}</span>
        <div class="log-entry-content">
          <div class="log-entry-title">${title}</div>
          <div class="log-entry-ts">${entry.ts}</div>
        </div>
        ${isDelete && entry.data ? `<button class="log-restore-btn" onclick="restoreFromLog(${i})">복원</button>` : ''}
      </div>`;
    }).join('');
    // 복원에 사용할 로그 캐시
    window._logCache = log;
  }

  function restoreFromLog(idx) {
    const entry = (window._logCache || [])[idx];
    if (!entry) return;
    if (entry.type === 'todo_delete') {
      const d = entry.data;
      if (!d || !d.id) return;
      if (todos.find(t => t.id === d.id)) { alert('이미 존재하는 항목입니다.'); return; }
      todos.push({ id: d.id, label: d.label, sub: d.sub || '', priority: d.priority || 'medium', order: todos.length, done: false, durMin: null });
      saveTodos(); renderTodos();
      logAction('todo_add', { id: d.id, label: d.label, note: '로그에서 복원' });
      loadAndRenderLog();
    } else if (entry.type === 'company_delete') {
      const d = entry.data;
      if (!d || !d.name) return;
      companies.push({ id: 'c-' + Date.now(), name: d.name, role: d.role || '', url: d.url || '', group: d.group || '회사리스트', date: d.date || todayISO(), applied: false });
      saveCompanies(); renderCompanies(); syncToServer();
      logAction('company_add', { name: d.name, note: '로그에서 복원' });
      loadAndRenderLog();
    }
  }

    btn.classList.add('selected');
