<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수련회 타임테이블</title>
<style>
    body {
        font-family: 'Pretendard', sans-serif;
        background-color: #f8f9fb;
        padding: 40px;
        line-height: 1.6;
    }
    .container {
        max-width: 800px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    h1 {
        text-align: center;
        margin-bottom: 10px;
    }
    .location {
        text-align: center;
        margin-bottom: 30px;
        font-size: 15px;
    }
    .location a {
        color: #0077ff;
        text-decoration: none;
        font-weight: 600;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }
    th, td {
        padding: 14px;
        border-bottom: 1px solid #e5e7eb;
    }
    th {
        background-color: #f1f5f9;
        text-align: left;
        font-weight: 600;
    }
    tr:hover {
        background-color: #f9fafb;
    }
    .day-title {
        font-size: 20px;
        font-weight: 700;
        margin: 40px 0 15px 0;
        border-left: 4px solid #0077ff;
        padding-left: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>수련회 타임테이블</h1>

    <div class="location">
        📍 숙소 장소: 
        <a href="https://www.airbnb.co.kr/rooms/26909651?viralityEntryPoint=1&s=76" target="_blank">
            에어비앤비 숙소 바로가기
        </a>
    </div>

    <div class="day-title">📅 Day 1</div>

    <table>
        <thead>
            <tr>
                <th>시간</th>
                <th>일정</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>15:30</td>
                <td>집합 / 출발</td>
            </tr>
            <tr>
                <td>16:00 - 17:00</td>
                <td>도착 / 정비</td>
            </tr>
            <tr>
                <td>17:00 - 18:00</td>
                <td>자유시간</td>
            </tr>
            <tr>
                <td>18:00 - 19:30</td>
                <td>식사</td>
            </tr>
            <tr>
                <td>20:00 - 21:30</td>
                <td>예배</td>
            </tr>
            <tr>
                <td>21:30 -</td>
                <td>레크레이션 / 교제</td>
            </tr>
            <tr>
                <td>이후</td>
                <td>자유시간</td>
            </tr>
        </tbody>
    </table>

    <div class="day-title">📅 Day 2</div>

    <table>
        <thead>
            <tr>
                <th>시간</th>
                <th>일정</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>오전</td>
                <td>기상 후 정비 / 식사</td>
            </tr>
            <tr>
                <td>오전</td>
                <td>예배 후 복귀</td>
            </tr>
            <tr>
                <td>점심 이후</td>
                <td>점심 식사 후 볼링장</td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
